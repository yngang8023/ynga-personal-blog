name: Sync Cloudflare RAG Knowledge Base

on:
  # 推送到 main 后自动同步博客文章目录到 Cloudflare RAG
  push:
    branches: [ main ]
    paths:
      - "src/content/posts/**"
      - "scripts/blog-rag-sync-utils.mjs"
      - "scripts/sync-blog-rag.mjs"
      # - "src/config.ts"
      # - ".github/workflows/deploy.yml"
  # 允许在 GitHub Actions 中手动触发一次全文同步
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "忽略 contentHash，强制重建全部文章 RAG 数据"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  sync-rag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Sync Cloudflare RAG knowledge base
        run: pnpm sync-rag
        env:
          BLOG_RAG_SYNC_TOKEN: ${{ secrets.BLOG_RAG_SYNC_TOKEN }}
          BLOG_RAG_SYNC_ENDPOINT: ${{ vars.BLOG_RAG_SYNC_ENDPOINT }}
          BLOG_RAG_SITE_URL: ${{ vars.BLOG_RAG_SITE_URL }}
          # 默认走增量同步；只有 workflow_dispatch 手动触发并勾选 force_rebuild 时才全量重建。
          BLOG_RAG_FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_rebuild && 'true' || 'false' }}

      # 当前博客正式部署由 EdgeOne Pages 负责，这里默认不执行 GitHub Pages 部署。
      # 如果其他开发者需要恢复 GitHub Pages 发布，可取消下面这段注释：
      #
      # - name: Build site
      #   run: pnpm run build
      #
      # - name: Deploy to pages branch
      #   uses: JamesIves/github-pages-deploy-action@v4
      #   with:
      #     branch: pages
      #     folder: dist
      #     clean: true
